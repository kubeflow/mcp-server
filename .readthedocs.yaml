# Read the Docs configuration for Kubeflow MCP Server.
#
# This mirrors the Kubeflow SDK docs setup, but builds the
# Sphinx project in this repository under docs/source.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
    uv: "latest"
  commands:
    - uv sync --group docs
    - uv run sphinx-build -b html docs/source $READTHEDOCS_OUTPUT/html

