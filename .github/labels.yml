# Labels matching kubeflow/sdk taxonomy
# Synced automatically via .github/workflows/sync-labels.yaml

# ── kind/* ─────────────────────────────────────────────────────────────────────
- name: kind/feature
  color: "2515fc"
  description: "New feature or request"

- name: kind/bug
  color: "fc2515"
  description: "Something isn't working"

- name: kind/cleanup
  color: "6eadc1"
  description: "Refactoring, chores, maintenance"

- name: kind/discussion
  color: "ecfc15"
  description: "Design discussion or question"

