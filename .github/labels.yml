# ── lifecycle/* ────────────────────────────────────────────────────────────────
- name: needs-triage
  color: "BB2E03"
  description: "Needs triage"

- name: lifecycle/stale
  color: "ededed"
  description: "No recent activity"

- name: lifecycle/frozen
  color: "ededed"
  description: "Frozen — do not close automatically"

# ── triage/* ───────────────────────────────────────────────────────────────────
- name: triage/accepted
  color: "8fc951"
  description: "Triaged and accepted"

# ── do-not-merge/* ─────────────────────────────────────────────────────────────
- name: do-not-merge/hold
  color: "e11d48"
  description: "Blocked — do not merge"

- name: do-not-merge/work-in-progress
  color: "e11d48"
  description: "Work in progress"

