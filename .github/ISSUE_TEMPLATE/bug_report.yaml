name: Bug Report
description: Report a bug in Kubeflow MCP Server
labels: ["kind/bug", "lifecycle/needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `kubeflow-mcp serve`
        2. Execute tool X
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"

  - type: dropdown
    id: python
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
