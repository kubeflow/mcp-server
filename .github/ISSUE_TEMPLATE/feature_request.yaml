name: Feature Request
description: Suggest a new feature for Kubeflow MCP Server
labels: ["kind/feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this Kubeflow MCP Server feature request!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this be implemented?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - None
        - Core
        - TrainerClient
        - OptimizerClient
        - ModelRegistryClient
        - PipelinesClient
        - SparkClient
        - CLI
        - Documentation

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related issues, PRs, upstream KEPs, or SDK issues
      placeholder: "e.g. kubeflow/sdk#125, KEP-936, agentgateway/agentgateway#42"
