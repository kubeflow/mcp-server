name: Welcome new contributors

on:
  pull_request_target:
    types:
      - opened
  issues:
    types:
      - opened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            🎉 **Welcome to the Kubeflow MCP Server!** 🎉

            Thanks for opening your first issue! We're happy to have you as part of our community 🚀

            **Here's what happens next:**

            - Our team will review your issue soon!
            - If you'd like to contribute to this issue, check out our [Contributing Guide](https://github.com/kubeflow/mcp-server/blob/main/CONTRIBUTING.md) for repo-specific guidelines and the [Kubeflow Contributor Guide](https://www.kubeflow.org/docs/about/contributing/) for general community standards

            **Join the community:**
            - **Slack**: Join [#kubeflow-ml-experience](https://www.kubeflow.org/docs/about/community/#slack-channels) on CNCF Slack
            - **Meetings**: Attend the [ML Experience WG](https://bit.ly/kf-ml-experience) bi-weekly meetings

            Feel free to ask questions in the comments if you need any help!
            Thanks again for contributing to Kubeflow! 🙏

          pr_message: |
            🎉 **Welcome to the Kubeflow MCP Server!** 🎉

            Thanks for opening your first PR! We're happy to have you as part of our community 🚀

            **Here's what happens next:**

            - If you haven't already, please check out our [Contributing Guide](https://github.com/kubeflow/mcp-server/blob/main/CONTRIBUTING.md) for repo-specific guidelines and the [Kubeflow Contributor Guide](https://www.kubeflow.org/docs/about/contributing/) for general community standards
            - Our team will review your PR soon!

            **Join the community:**
            - **Slack**: Join [#kubeflow-ml-experience](https://www.kubeflow.org/docs/about/community/#slack-channels) on CNCF Slack
            - **Meetings**: Attend the [ML Experience WG](https://bit.ly/kf-ml-experience) bi-weekly meetings

            Feel free to ask questions in the comments if you need any help!
            Thanks again for contributing to Kubeflow! 🙏
