name: Check PR Title

on:
  pull_request_target:
    branches:
      - main
    types:
      - edited
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  check:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            revert
            chore
          scopes: |
            ci
            docs
            deps
            agents
            core
            trainer
            optimizer
            hub
            examples
            benchmarks
          requireScope: false
          ignoreLabels: |
            do-not-merge/work-in-progress
            dependencies
            area/release
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            PR title must start with a lowercase letter.
            Example: "feat: add training job tool"
